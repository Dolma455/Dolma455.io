<svg width="400" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1618;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0b0c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="800" fill="url(#screenGrad)"/>
  
  <!-- Status Bar -->
  <rect width="400" height="44" fill="#0d0b0c"/>
  <text x="200" y="30" font-size="14" text-anchor="middle" fill="white" font-family="Arial">9:41</text>
  
  <!-- Header -->
  <rect width="400" height="100" fill="#1a1618" y="44"/>
  <text x="30" y="90" font-size="28" font-weight="bold" fill="white" font-family="Arial">Naasa X</text>
  <text x="30" y="125" font-size="14" fill="#fd70a0" font-family="Arial">Trading Platform</text>
  
  <!-- Chart placeholder -->
  <rect x="30" y="160" width="340" height="200" fill="#3a1a24" rx="10"/>
  <text x="200" y="260" font-size="24" text-anchor="middle" fill="#fd70a0" font-family="Arial">Chart Area</text>
  
  <!-- Balance section -->
  <rect x="30" y="380" width="340" height="100" fill="#3a1a24" rx="10"/>
  <text x="50" y="410" font-size="14" fill="#fca8c7" font-family="Arial">Total Balance</text>
  <text x="50" y="450" font-size="32" font-weight="bold" fill="white" font-family="Arial">$24,500.50</text>
  
  <!-- Action Buttons -->
  <rect x="30" y="500" width="160" height="60" fill="#fd70a0" rx="15"/>
  <text x="110" y="535" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Buy</text>
  
  <rect x="210" y="500" width="160" height="60" fill="#d6497a" rx="15"/>
  <text x="290" y="535" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Sell</text>
  
  <!-- PLACEHOLDER label -->
  <text x="200" y="700" font-size="16" text-anchor="middle" fill="#fd70a0" font-family="Arial">PLACEHOLDER - Replace with real screenshot</text>
</svg>
