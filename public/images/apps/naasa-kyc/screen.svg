<svg width="400" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0d21;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="800" fill="url(#screenGrad)"/>
  
  <!-- Status Bar -->
  <rect width="400" height="44" fill="#0f0d21"/>
  <text x="200" y="30" font-size="14" text-anchor="middle" fill="white" font-family="Arial">9:41</text>
  
  <!-- Header -->
  <rect width="400" height="100" fill="#1a1729" y="44"/>
  <text x="30" y="90" font-size="28" font-weight="bold" fill="white" font-family="Arial">Verify Identity</text>
  <text x="30" y="125" font-size="14" fill="#a78bcc" font-family="Arial">KYC Process</text>
  
  <!-- Progress indicator -->
  <rect x="30" y="160" width="340" height="8" fill="#2d264e" rx="4"/>
  <rect x="30" y="160" width="102" height="8" fill="#a78bcc" rx="4"/>
  <text x="200" y="190" font-size="12" text-anchor="middle" fill="#a99ac9" font-family="Arial">Step 1 of 3</text>
  
  <!-- Document upload area -->
  <rect x="30" y="220" width="340" height="150" fill="#2d264e" rx="10" stroke="#a78bcc" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="200" y="290" font-size="48" text-anchor="middle" fill="#a78bcc" font-family="Arial">📄</text>
  <text x="200" y="330" font-size="14" text-anchor="middle" fill="#a99ac9" font-family="Arial">Upload Document</text>
  
  <!-- Next Button -->
  <rect x="30" y="700" width="340" height="60" fill="#a78bcc" rx="15"/>
  <text x="200" y="735" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Next Step</text>
  
  <!-- PLACEHOLDER label -->
  <text x="200" y="780" font-size="12" text-anchor="middle" fill="#a78bcc" font-family="Arial">PLACEHOLDER</text>
</svg>
